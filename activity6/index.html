<!DOCTYPE html>
<html lang="en">

<head>

    <title>Activity 6</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <p class="ui-badge">New</p>
        <p class="ui-pill">Active User</p>
        <div class="ui-avatar">
            JD
        </div>
        <button class="ui-btn">Create Account</button>
        <div class="field-group">
            <form action="">
                <label for="email" class="input-label">Email Address</label>
                <input type="email" name="email" class="input-element" placeholder="you@example.com">

        </div>

        <div class="alert-container">

            </p>

        <div class="feature-card">
            <div class="card-icon">⚡</div>
            <h3 class="heading">Fast Speed</h3>
            <p class="description">Our edge network delivers your text content instantly.</p>
        </div>

        <nav>
            <ul class="nav-menu">
                <li class="nav-link">
                    <a href="#" class="active-item">Home</a>
                </li>
                <li class="nav-link">
                    <a href="#" class="not-active">Files</a>
                </li>
                <li class="nav-link">
                    <a href="#" class="not-active" >Apps</a>
                </li>
            </ul>
        </nav>
        

    </main>

</html>
